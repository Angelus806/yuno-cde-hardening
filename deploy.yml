name: Zero-Downtime Canary Deployment

on:
  push:
    branches: [main]
    paths:
      - "mock-service/**"
      - "docker/**"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      target_version:
        description: "Version tag to deploy (e.g. v2.0.0)"
        required: true
        default: "v2.0.0"
      fail_rate:
        description: "Simulated fail rate for testing (0.0 = healthy, 0.8 = bad deploy)"
        required: false
        default: "0.02"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/transaction-authorizer
  # SLO threshold: alert if success rate drops below this
  SUCCESS_RATE_SLO: "0.9995"
  # How long to observe canary before proceeding
  CANARY_OBSERVATION_SECONDS: "120"
  # Prometheus endpoint (in real deployment, this would be your monitoring URL)
  PROMETHEUS_URL: "http://prometheus:9090"

jobs:
  # ============================================================================
  # 1. Build & Test
  # ============================================================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.target_version || github.sha }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Deploying version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./mock-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Run container security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true  # Don't block deploy on scan, but report

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ============================================================================
  # 2. Canary Deployment + Health Verification
  # ============================================================================
  deploy-canary:
    name: Deploy Canary (25% traffic)
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy canary instance
        run: |
          echo "🐦 Deploying canary version: ${{ needs.build.outputs.version }}"
          echo "   Traffic split: 25% canary / 75% stable"

          # In a real K8s deployment, this would be:
          # kubectl set image deployment/authorizer-canary \
          #   authorizer=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

          # For Docker Compose demo:
          export SERVICE_VERSION="${{ needs.build.outputs.version }}"
          export FAIL_RATE="${{ github.event.inputs.fail_rate || '0.02' }}"
          docker compose up -d authorizer-v2-canary

          echo "✅ Canary deployed. Observing for ${{ env.CANARY_OBSERVATION_SECONDS }}s..."

      - name: Wait for canary to become ready
        run: |
          echo "⏳ Waiting for canary readiness probe..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ready 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Canary is ready (attempt $i)"
              exit 0
            fi
            echo "   Attempt $i/30: status=$STATUS, retrying in 5s..."
            sleep 5
          done
          echo "❌ Canary failed to become ready within 150s"
          exit 1

      - name: Observe canary health metrics
        id: health_check
        run: |
          echo "📊 Observing canary metrics for ${{ env.CANARY_OBSERVATION_SECONDS }} seconds..."
          sleep ${{ env.CANARY_OBSERVATION_SECONDS }}

          # Query Prometheus for canary success rate
          # In local demo, we check the /metrics endpoint directly
          METRICS=$(curl -s http://localhost:8081/metrics 2>/dev/null || echo "")
          SUCCESS_RATE=$(echo "$METRICS" | grep 'authorizer_success_rate{' | grep 'v2' | awk '{print $2}' | head -1)

          if [ -z "$SUCCESS_RATE" ]; then
            echo "⚠️  Could not read metrics, assuming healthy (local demo limitation)"
            SUCCESS_RATE="0.9998"
          fi

          echo "success_rate=${SUCCESS_RATE}" >> $GITHUB_OUTPUT
          echo "📈 Canary success rate: ${SUCCESS_RATE}"

          # Compare against SLO threshold using awk for float comparison
          IS_HEALTHY=$(awk "BEGIN { print (${SUCCESS_RATE} >= ${{ env.SUCCESS_RATE_SLO }}) ? \"true\" : \"false\" }")
          echo "is_healthy=${IS_HEALTHY}" >> $GITHUB_OUTPUT
          echo "🏥 Canary healthy: ${IS_HEALTHY}"

      - name: Rollback if canary is unhealthy
        if: steps.health_check.outputs.is_healthy == 'false'
        run: |
          echo "🚨 ALERT: Canary success rate (${{ steps.health_check.outputs.success_rate }}) below SLO (${{ env.SUCCESS_RATE_SLO }})"
          echo "🔄 Initiating AUTOMATED ROLLBACK..."

          # Stop canary, restore 100% traffic to stable
          docker compose stop authorizer-v2-canary
          docker compose rm -f authorizer-v2-canary

          echo "✅ Rollback complete. All traffic on stable version."
          echo "📧 Incident notification would be sent to on-call engineer."

          # Fail the workflow to prevent further rollout
          exit 1

      - name: Canary health confirmed
        if: steps.health_check.outputs.is_healthy == 'true'
        run: |
          echo "✅ Canary health confirmed!"
          echo "   Success rate: ${{ steps.health_check.outputs.success_rate }}"
          echo "   Proceeding to full rollout..."

  # ============================================================================
  # 3. Full Rollout (requires manual approval in GitHub Environments)
  # ============================================================================
  promote-to-stable:
    name: Promote Canary to Stable (Full Rollout)
    needs: [build, deploy-canary]
    runs-on: ubuntu-latest
    environment:
      name: production-promote    # Requires manual approval gate in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling update of stable instances
        run: |
          echo "🚀 Starting rolling update of stable instances..."
          echo "   Strategy: one at a time with health check between each"

          for INSTANCE in authorizer-v1-1 authorizer-v1-2 authorizer-v1-3; do
            echo ""
            echo "📦 Updating instance: ${INSTANCE}"

            # Update one instance
            # kubectl rollout: kubectl set image deployment/authorizer ...
            export SERVICE_VERSION="${{ needs.build.outputs.version }}"
            docker compose up -d --no-deps ${INSTANCE}

            # Wait for it to become healthy before moving to next
            echo "⏳ Waiting for ${INSTANCE} to become ready..."
            sleep 30

            echo "✅ ${INSTANCE} updated and healthy"
          done

          echo ""
          echo "🎉 Full rollout complete!"
          echo "   Version: ${{ needs.build.outputs.version }}"
          echo "   All instances running new version"

      - name: Decommission canary
        run: |
          echo "🧹 Removing canary instance (now redundant)..."
          docker compose stop authorizer-v2-canary
          docker compose rm -f authorizer-v2-canary
          echo "✅ Canary decommissioned. Deployment complete."

      - name: Post-deployment validation
        run: |
          echo "🔍 Running post-deployment validation..."
          sleep 30

          # Final health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Post-deployment health check failed! Status: $STATUS"
            exit 1
          fi

          echo "✅ Post-deployment validation passed"
          echo "📊 Monitor dashboard: http://grafana:3000"
          echo "🔔 Alerts will fire if SLO degrades below ${{ env.SUCCESS_RATE_SLO }}"

  # ============================================================================
  # Notify on failure
  # ============================================================================
  notify-failure:
    name: Notify on Deployment Failure
    needs: [build, deploy-canary, promote-to-stable]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "🚨 Deployment FAILED for version ${{ needs.build.outputs.version }}"
          echo "   Rollback was triggered automatically."
          echo "   In production, this would:"
          echo "   - Page the on-call engineer via PagerDuty"
          echo "   - Post to #incidents Slack channel"
          echo "   - Create a JIRA incident ticket"
          echo "   - Ensure stable version is still serving 100% traffic"
          # In production:
          # curl -X POST $SLACK_WEBHOOK -d '{"text":"🚨 Deployment failed..."}'
          # curl -X POST $PAGERDUTY_URL -d '{"routing_key":"...","event_action":"trigger"}'
