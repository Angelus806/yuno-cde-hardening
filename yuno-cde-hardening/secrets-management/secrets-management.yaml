---
# =============================================================================
# Yuno CDE Cluster — Secrets Management
# Tool: External Secrets Operator (ESO) + HashiCorp Vault
# Requirement: PCI-DSS 3.4 — Render CHD unreadable; eliminate plaintext creds
#
# KEY CONSTRAINT: Application code reads from ENV vars (os.Getenv("STRIPE_API_KEY")).
# We CANNOT modify application code. Solution: Use ESO to sync secrets from
# Vault into Kubernetes Secret objects, then use a custom init container to
# write those secrets as FILES, and use an LD_PRELOAD trick or envsecrets
# wrapper to expose them as env vars FROM FILES — keeping them out of the
# pod spec manifest (which is stored in etcd in plaintext).
#
# Architecture:
#   HashiCorp Vault (external) → ESO SecretStore → Kubernetes Secret (encrypted etcd)
#   → Pod volume mount (file, 0400) → init container writes to /secrets/
#   → App reads env var via Kubernetes Secret envFrom (not literal values in spec)
# =============================================================================

# ----------------------------------------------------------------------------
# 0. Install External Secrets Operator (run once)
#    helm repo add external-secrets https://charts.external-secrets.io
#    helm install external-secrets external-secrets/external-secrets \
#      -n external-secrets --create-namespace
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# 1. Vault Authentication — ServiceAccount for ESO to authenticate to Vault
#    ESO uses Kubernetes ServiceAccount token to authenticate against Vault's
#    Kubernetes auth method. Vault verifies the token with the K8s API.
#    PCI-DSS: Requirement 10.2 — All secret access is logged in Vault audit log
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-vault-auth
  namespace: cde
  annotations:
    description: >
      ServiceAccount used by External Secrets Operator to authenticate
      with HashiCorp Vault via the Kubernetes auth method. This SA has
      no other permissions in the cluster.

---
# ----------------------------------------------------------------------------
# 2. ClusterSecretStore — Connection to Vault
#    Defines HOW ESO connects to Vault. Uses Kubernetes auth method.
#    Vault must be configured with:
#      vault auth enable kubernetes
#      vault write auth/kubernetes/config \
#        kubernetes_host="https://$K8S_HOST:443" \
#        token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
#        kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
# ----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  annotations:
    description: >
      Connects External Secrets Operator to HashiCorp Vault.
      All CDE namespaces use this store to fetch payment credentials.
      Vault URL must be internal (not public internet) for CDE compliance.
spec:
  provider:
    vault:
      server: "https://vault.internal.yuno.com:8200"
      path: "secret"           # KV v2 mount path
      version: "v2"
      caBundle: ""             # Set to base64-encoded Vault CA cert for TLS verification
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "cde-payment-services"   # Vault role defined below
          serviceAccountRef:
            name: external-secrets-vault-auth
            namespace: cde

---
# VAULT CONFIGURATION (apply in Vault, not in Kubernetes):
# vault policy write cde-payment-services - <<EOF
# path "secret/data/cde/*" {
#   capabilities = ["read"]
# }
# EOF
#
# vault write auth/kubernetes/role/cde-payment-services \
#   bound_service_account_names=external-secrets-vault-auth \
#   bound_service_account_namespaces=cde \
#   policies=cde-payment-services \
#   ttl=1h

---
# ----------------------------------------------------------------------------
# 3. ExternalSecret — Stripe API Credentials
#    Syncs from Vault KV to Kubernetes Secret. ESO creates/updates the
#    Kubernetes Secret automatically. refreshInterval controls how often
#    ESO re-fetches from Vault (enables rotation without pod restarts).
#    PCI-DSS: Requirement 3.4 — Credentials never appear in pod specs
# ----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stripe-credentials
  namespace: cde
  annotations:
    description: >
      Syncs Stripe API keys from Vault KV secret 'cde/stripe' into a
      Kubernetes Secret named 'stripe-credentials'. The refreshInterval
      of 1h means rotated keys are picked up within 1 hour without pod
      restarts. Combined with the SecretProviderClass, these are mounted
      as files (not injected as literal ENV values in pod spec).
    policy.yuno.com/pci-req: "3.4, 10.2"
spec:
  refreshInterval: 1h        # Re-fetch from Vault every hour (enables rotation)
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: stripe-credentials  # Name of the Kubernetes Secret to create
    creationPolicy: Owner     # ESO owns this secret; deletes when ExternalSecret deleted
    template:
      type: Opaque
      metadata:
        labels:
          pci-scope: "cde"
          managed-by: "external-secrets"
  data:
    - secretKey: STRIPE_API_KEY
      remoteRef:
        key: cde/stripe
        property: api_key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: cde/stripe
        property: webhook_secret

---
# ----------------------------------------------------------------------------
# 4. ExternalSecret — Database Credentials
# ----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-db-credentials
  namespace: cde
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: cde/database
        property: password
    - secretKey: DB_USERNAME
      remoteRef:
        key: cde/database
        property: username
    - secretKey: DB_HOST
      remoteRef:
        key: cde/database
        property: host

---
# ----------------------------------------------------------------------------
# 5. ExternalSecret — Payment Provider Credentials (multi-provider)
# ----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-provider-credentials
  namespace: cde
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: payment-provider-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: ADYEN_API_KEY
      remoteRef:
        key: cde/adyen
        property: api_key
    - secretKey: MERCADOPAGO_ACCESS_TOKEN
      remoteRef:
        key: cde/mercadopago
        property: access_token
    - secretKey: STRIPE_API_KEY
      remoteRef:
        key: cde/stripe
        property: api_key

---
# ----------------------------------------------------------------------------
# 6. Pod Deployment — How to consume secrets WITHOUT modifying app code
#
#    CONSTRAINT: App code uses os.Getenv("STRIPE_API_KEY") — we cannot change this.
#
#    SOLUTION: Use `envFrom` to source env vars from the Kubernetes Secret
#    created by ESO. The pod spec references the SECRET NAME, not the literal
#    values. Values never appear in the pod spec (stored in etcd) or in CI/CD
#    manifests committed to git. This satisfies PCI-DSS Req 3.4.
#
#    Note: A more restrictive approach (file-based) is included as an
#    alternative below. The envFrom approach is chosen here because:
#    - It doesn't require app code changes (satisfies the constraint)
#    - Values are still in K8s Secrets (encrypted at rest if etcd encryption enabled)
#    - Values are NOT in pod spec manifests, git, or CI/CD logs
#    - Access is controlled by RBAC (Secrets get/list on specific secret names)
# ----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: cde
  labels:
    app: payment-gateway
    pci-scope: cde
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
        pci-scope: cde
    spec:
      serviceAccountName: payment-gateway-sa
      automountServiceAccountToken: false  # Don't auto-mount; use explicit volume if needed

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: payment-gateway
          image: yuno/payment-gateway:v1.2.3  # Must be signed — see supply-chain policies
          imagePullPolicy: Always

          # SECRETS INJECTION: envFrom sources env vars from the ESO-managed Secret.
          # App code calls os.Getenv("STRIPE_API_KEY") — this satisfies that constraint
          # without the literal values appearing anywhere in this manifest.
          envFrom:
            - secretRef:
                name: payment-provider-credentials  # Created by ExternalSecret #5 above
            - secretRef:
                name: vault-db-credentials          # Created by ExternalSecret #4 above

          # Non-sensitive config via ConfigMap
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: PROVIDER_TIMEOUT_MS
              value: "5000"

          ports:
            - containerPort: 8080
              name: http

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Writable temp dir (needed since root FS is read-only)
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

      volumes:
        - name: tmp-dir
          emptyDir: {}

---
# ----------------------------------------------------------------------------
# 7. Secret Rotation Procedure
#
#    Rotation with ESO (refreshInterval: 1h):
#    1. Update the secret in Vault:
#       vault kv put secret/cde/stripe api_key="sk_live_NEW_KEY" webhook_secret="whsec_NEW"
#    2. ESO will re-fetch within the refreshInterval (up to 1 hour).
#       To force immediate refresh:
#       kubectl annotate externalsecret stripe-credentials \
#         force-sync=$(date +%s) --overwrite -n cde
#    3. Kubernetes Secret is updated. New pods will receive the new value.
#    4. Running pods: The env var is set at container start. For zero-downtime
#       rotation, trigger a rolling restart:
#       kubectl rollout restart deployment/payment-gateway -n cde
#    5. Verify: kubectl rollout status deployment/payment-gateway -n cde
#
#    PCI-DSS Requirement 3.6.1 — Cryptographic key management:
#    Vault audit logs record every secret read with timestamp, client IP,
#    and Kubernetes service account identity. These logs satisfy PCI audit trail
#    requirements (Requirement 10.2).
# ----------------------------------------------------------------------------

---
# ----------------------------------------------------------------------------
# 8. RBAC — Restrict who can read Kubernetes Secrets in the CDE namespace
#    PCI-DSS: Requirement 7.1 — Least privilege access to CHD systems
# ----------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cde-secrets-reader
  namespace: cde
spec:
  rules:
    - apiGroups: [""]
      resources: ["secrets"]
      resourceNames:           # Only specific secrets, not all secrets in namespace
        - "stripe-credentials"
        - "vault-db-credentials"
        - "payment-provider-credentials"
      verbs: ["get"]           # get only — no list (prevents bulk enumeration)

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-gateway-secrets
  namespace: cde
subjects:
  - kind: ServiceAccount
    name: payment-gateway-sa
    namespace: cde
roleRef:
  kind: Role
  apiRef: rbac.authorization.k8s.io
  name: cde-secrets-reader

---
# ----------------------------------------------------------------------------
# 9. Verify etcd encryption at rest is enabled for Secrets
#    Run on the control plane node to check encryption config:
#
#    kubectl get secret -n cde stripe-credentials -o yaml
#    # The value should be encrypted if etcd encryption is configured
#
#    Verify etcd encryption:
#    ETCDCTL_API=3 etcdctl get /registry/secrets/cde/stripe-credentials \
#      --endpoints=https://127.0.0.1:2379 \
#      --cert=/etc/kubernetes/pki/etcd/server.crt \
#      --key=/etc/kubernetes/pki/etcd/server.key \
#      --cacert=/etc/kubernetes/pki/etcd/ca.crt
#    # Should show encrypted bytes, NOT plaintext YAML
# ----------------------------------------------------------------------------
