---
# ----------------------------------------------------------------------------
# 5. Kyverno Policy — Require SBOM Attestation
#    Blocks images that don't have an attached SBOM attestation.
#    Enables full software inventory for PCI-DSS audits.
# ----------------------------------------------------------------------------
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-sbom-attestation
  annotations:
    policies.kyverno.io/title: Require SBOM Attestation
    policies.kyverno.io/category: Supply Chain Security - CDE
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      All images in the CDE namespace must have an SBOM attestation signed
      by the Yuno CI/CD pipeline. The SBOM provides a complete inventory of
      software components for PCI-DSS audit purposes and vulnerability tracking.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: require-sbom
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cde, payment-services]
      verifyImages:
        - imageReferences:
            - "*.azurecr.io/yuno/*"
            - "ghcr.io/yuno-payments/*"
          attestations:
            - predicateType: https://spdx.dev/Document
              attestors:
                - count: 1
                  entries:
                    - keys:
                        publicKeys: |-
                          -----BEGIN PUBLIC KEY-----
                          # REPLACE WITH ACTUAL cosign.pub CONTENT
                          -----END PUBLIC KEY-----
