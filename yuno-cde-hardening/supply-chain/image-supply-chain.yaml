---
# =============================================================================
# Yuno CDE Cluster — Image Supply Chain Security
# Tools: Cosign (Sigstore) for signing + Kyverno for admission verification
# Requirement: PCI-DSS 6.3 — Protect against known vulnerabilities
# Stretch Goal #5: Image Supply Chain Security
# =============================================================================

# ----------------------------------------------------------------------------
# 1. Kyverno Policy — Verify Image Signatures (Cosign/Sigstore)
#    Blocks any image that hasn't been signed by Yuno's CI/CD pipeline.
#    This prevents:
#      - Unreviewed developer images deployed to production
#      - Compromised base images from third-party registries
#      - Images from forks/PRs that bypassed the security pipeline
#    PCI-DSS: Requirement 6.3.3 — All software components protected from
#    known vulnerabilities via patch management
# ----------------------------------------------------------------------------
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Container Image Signatures
    policies.kyverno.io/category: Supply Chain Security - CDE
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >
      All container images deployed to the CDE namespace must be signed using
      Cosign with Yuno's CI/CD signing key. Images without a valid signature
      are rejected at admission. The public key is stored as a Kubernetes Secret
      and rotated quarterly per PCI-DSS key management requirements.
spec:
  validationFailureAction: Enforce
  background: false       # Don't check existing pods — only new admissions
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cde, payment-services]
      verifyImages:
        - imageReferences:
            - "*.azurecr.io/yuno/*"          # Azure Container Registry (primary)
            - "ghcr.io/yuno-payments/*"       # GitHub Container Registry (CI)
          attestors:
            - count: 1   # At least 1 attestor must verify
              entries:
                - keys:
                    # Yuno CI/CD signing public key (cosign.pub)
                    # Rotate this key quarterly per PCI-DSS key management requirements
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      # REPLACE WITH ACTUAL cosign.pub CONTENT
                      # Generate with: cosign generate-key-pair
                      # Store private key in Vault: vault kv put secret/cosign/private key=@cosign.key
                      -----END PUBLIC KEY-----
                    signatureAlgorithm: sha256
          mutateDigest: true    # Replace tags with digest for immutability (tag mutability attack)
          verifyDigest: true
          required: true

---
# ----------------------------------------------------------------------------
# 2. Kyverno Policy — Block Images from Untrusted Registries
#    Only images from Yuno's own registries are permitted in the CDE.
#    Blocks: Docker Hub, random public registries, unverified sources.
#    PCI-DSS: Requirement 6.3 — Protect against known vulnerabilities
# ----------------------------------------------------------------------------
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict to Trusted Image Registries
    policies.kyverno.io/category: Supply Chain Security - CDE
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: trusted-registries-only
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cde, payment-services]
      validate:
        message: >
          Images in the CDE namespace must come from Yuno's trusted registries:
          - *.azurecr.io/yuno/* (Azure Container Registry)
          - ghcr.io/yuno-payments/* (GitHub Container Registry)
          Docker Hub, quay.io, and other public registries are not permitted.
        pattern:
          spec:
            containers:
              - image: "*.azurecr.io/yuno/* | ghcr.io/yuno-payments/*"
            =(initContainers):
              - image: "*.azurecr.io/yuno/* | ghcr.io/yuno-payments/*"

---
# ----------------------------------------------------------------------------
# 3. Kyverno Policy — Block Images with Latest Tag
#    Using 'latest' tag breaks image immutability and reproducibility.
#    All CDE deployments must use specific version tags or digest references.
#    PCI-DSS: Requirement 6.3.3 — Controlled patch management
# ----------------------------------------------------------------------------
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-latest-tag
  annotations:
    policies.kyverno.io/title: Block Latest Tag in CDE
    policies.kyverno.io/category: Supply Chain Security - CDE
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-latest-or-no-tag
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [cde, payment-services]
      validate:
        message: >
          Container images must not use the 'latest' tag or be referenced without
          a tag. Use a specific version tag (e.g., :v1.2.3) or SHA digest
          (e.g., @sha256:abc123...) for all CDE deployments.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].image }}"
                operator: AnyIn
                value:
                  - "*:latest"
                  - "*/latest"
              - key: >
                  {{ request.object.spec.containers[].image |
                  map(&contains(@, ':'), @) | contains(@, `false`) }}
                operator: Equals
                value: true

---
# ----------------------------------------------------------------------------
