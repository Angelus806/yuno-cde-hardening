#    This is the CI/CD pipeline that produces signed, scanned images.
#    Save as: .github/workflows/build-cde-image.yml
# ----------------------------------------------------------------------------
# (This section documents the GitHub Actions workflow as YAML comments
#  since it's a different file format — see the CI pipeline file)
#
# Pipeline stages:
#   1. Build image from Dockerfile
#   2. Scan with Trivy for HIGH/CRITICAL CVEs → fail pipeline if found
#   3. Sign image with Cosign using the private key stored in GitHub Secrets
#   4. Generate and attest SBOM (Software Bill of Materials)
#   5. Push to ACR with version tag (not latest)
